<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Silly Pickleball Memory Game</title>
  <meta name="description" content="Match silly pickleball moments and reveal the social signal underneath.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Montserrat:wght@500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #F7F5F1;
      --cream: #EDE7DE;
      --ink: #1D2433;
      --blue: #66786A;
      --gold: #C8A15A;
      --red: #9B6B52;
      --green: #66786A;
      --line: rgba(26, 22, 18, .16);
      --sans: "Montserrat", Arial, sans-serif;
      --serif: "Fredoka", "Montserrat", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: var(--sans);
      background:
        radial-gradient(circle at 8% 10%, rgba(91, 143, 212, .20), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(200, 70, 44, .16), transparent 25%),
        linear-gradient(180deg, var(--paper), var(--cream));
    }

    a { color: inherit; text-decoration: none; }

    .game-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(300px, .7fr) minmax(560px, 1fr);
      gap: clamp(24px, 4vw, 64px);
      padding: clamp(20px, 4vw, 64px);
      align-items: center;
    }

    .copy-panel {
      display: grid;
      align-content: center;
      gap: 22px;
      min-height: calc(100vh - 128px);
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 850;
    }

    .brand-ball {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 30% 36%, var(--paper) 0 2px, transparent 3px),
        radial-gradient(circle at 63% 38%, var(--paper) 0 2px, transparent 3px),
        radial-gradient(circle at 48% 68%, var(--paper) 0 2px, transparent 3px),
        var(--gold);
      box-shadow: inset 0 0 0 2px rgba(26, 22, 18, .18);
    }

    .eyebrow {
      margin: 0;
      font-size: .68rem;
      font-weight: 850;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--red);
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-family: var(--serif);
      font-size: clamp(4rem, 8vw, 8.6rem);
      line-height: .86;
      font-weight: 700;
    }

    .lede {
      margin: 0;
      max-width: 610px;
      font-family: var(--sans);
      font-size: clamp(1.25rem, 2.4vw, 2rem);
      line-height: 1.16;
      font-weight: 800;
      color: rgba(26, 22, 18, .70);
    }

    .score-card {
      width: min(100%, 520px);
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(251, 247, 239, .78);
      box-shadow: 0 22px 70px rgba(26, 22, 18, .12);
    }

    .score-top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      font-size: .72rem;
      font-weight: 850;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(26, 22, 18, .58);
    }

    .score-count {
      font-family: var(--serif);
      font-size: 2rem;
      line-height: 1;
      color: var(--gold);
      letter-spacing: 0;
      white-space: nowrap;
    }

    .bar {
      height: 10px;
      margin-top: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(184, 149, 74, .18);
    }

    .fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--gold), var(--red));
      transition: width .28s ease;
    }

    .status {
      min-height: 44px;
      margin: 14px 0 0;
      font-family: var(--serif);
      font-size: 1.25rem;
      line-height: 1.15;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .button {
      min-height: 44px;
      padding: 0 16px;
      border: 1px solid transparent;
      border-radius: 8px;
      font: 850 .82rem var(--sans);
      cursor: pointer;
    }

    .button.primary {
      background: var(--blue);
      color: var(--ink);
    }

    .button.secondary {
      background: rgba(251, 247, 239, .68);
      border-color: var(--line);
      color: var(--ink);
    }

    .board-wrap {
      position: relative;
      padding: clamp(14px, 2vw, 24px);
      border: 1px solid rgba(26, 22, 18, .14);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(251, 247, 239, .86), rgba(251, 247, 239, .54)),
        url("assets/silly-surface-sections.png") center / cover;
      box-shadow: 0 28px 90px rgba(26, 22, 18, .20);
      overflow: hidden;
    }

    .board-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(251, 247, 239, .74);
      backdrop-filter: blur(4px);
    }

    .board {
      position: relative;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: clamp(10px, 1.4vw, 16px);
      perspective: 1200px;
    }

    .card {
      position: relative;
      aspect-ratio: 1 / .76;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      font: inherit;
      color: inherit;
      perspective: 1000px;
    }

    .card:focus-visible {
      outline: 3px solid var(--blue);
      outline-offset: 4px;
      border-radius: 8px;
    }

    .card-inner {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transition: transform .36s cubic-bezier(.22, 1, .36, 1);
    }

    .card.open .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      border-radius: 8px;
      border: 1.5px solid rgba(184, 149, 74, .42);
      backface-visibility: hidden;
      overflow: hidden;
      box-shadow: 0 14px 30px rgba(26, 22, 18, .12), inset 0 0 0 1px rgba(255, 255, 255, .52);
    }

    .front {
      background:
        radial-gradient(circle at 50% 35%, rgba(184, 149, 74, .22), transparent 30%),
        linear-gradient(180deg, rgba(251, 247, 239, .98), rgba(243, 234, 216, .92));
    }

    .card-logo {
      display: grid;
      place-items: center;
      gap: 6px;
      width: 100%;
      padding: 10px;
    }

    .card-logo svg {
      display: block;
      width: min(76px, 52%);
      height: auto;
      filter: drop-shadow(0 10px 18px rgba(26, 22, 18, .14));
    }

    .card-logo strong {
      display: block;
      font-family: var(--serif);
      font-size: clamp(.95rem, 1.35vw, 1.34rem);
      line-height: .92;
      color: var(--ink);
    }

    .card-logo span {
      display: block;
      font-size: clamp(.48rem, .68vw, .64rem);
      font-weight: 900;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--red);
    }

    .back {
      transform: rotateY(180deg);
      align-content: center;
      gap: 4px;
      padding: 8px;
      background: linear-gradient(180deg, rgba(26, 22, 18, .97), rgba(26, 22, 18, .90));
      color: var(--paper);
    }

    .matched .back {
      background: linear-gradient(180deg, #124a76, #17344f);
      border-color: rgba(91, 143, 212, .76);
    }

    .card-graphic {
      display: grid;
      place-items: center;
      width: min(54px, 34%);
      aspect-ratio: 1;
      margin: 0 auto 2px;
      border-radius: 999px;
      background: rgba(251, 247, 239, .10);
      box-shadow: inset 0 0 0 1px rgba(251, 247, 239, .14);
    }

    .card-graphic svg {
      display: block;
      width: 78%;
      height: 78%;
    }

    .card-title {
      display: block;
      font-family: var(--serif);
      font-size: clamp(.82rem, 1.2vw, 1.22rem);
      line-height: .96;
      font-weight: 850;
    }

    .card-note {
      display: block;
      max-width: 92%;
      margin: 0 auto;
      font-size: clamp(.48rem, .66vw, .62rem);
      line-height: 1.12;
      font-weight: 850;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #f4d98b;
    }

    @media (max-width: 1040px) {
      .game-shell {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .copy-panel {
        min-height: auto;
      }
    }

    @media (max-width: 640px) {
      .game-shell {
        padding: 16px;
      }

      .board {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <section class="copy-panel" aria-labelledby="game-title">
      <a class="brand-row" href="index.html" aria-label="Silly Pickleball home">
        <span class="brand-ball" aria-hidden="true"></span>
        <span>Silly Pickleball</span>
      </a>
      <p class="eyebrow">Silliness match</p>
      <h1 id="game-title">Match the silly. Find the signal.</h1>
      <p class="lede">Every pair is a pickleball absurdity. Matching it turns the joke into a read on who can relax, recover, and play well with others.</p>
      <div class="score-card" aria-live="polite">
        <div class="score-top">
          <span>Progress</span>
          <span class="score-count" id="score-count">0 / 6</span>
        </div>
        <div class="bar" aria-hidden="true"><div class="fill" id="fill"></div></div>
        <p class="status" id="status">Pick two cards. A match means the room got a little safer.</p>
        <div class="actions">
          <button class="button primary" id="reset" type="button">Shuffle board</button>
          <a class="button secondary" href="index.html">Back to site</a>
        </div>
      </div>
    </section>

    <section class="board-wrap" aria-label="Silly Pickleball memory game board">
      <div class="board" id="board"></div>
    </section>
  </main>

  <script>
    const art = {
      score: `<svg viewBox="0 0 96 96" aria-hidden="true"><rect x="14" y="22" width="68" height="52" rx="7" fill="#F7F5F1"/><rect x="20" y="28" width="56" height="40" rx="4" fill="#1D2433"/><path d="M30 42h10m8 0h18M30 56h10m8 0h18" stroke="#C8A15A" stroke-width="5" stroke-linecap="round"/><circle cx="30" cy="42" r="3" fill="#9B6B52"/><circle cx="30" cy="56" r="3" fill="#66786A"/></svg>`,
      dink: `<svg viewBox="0 0 96 96" aria-hidden="true"><path d="M26 65l18-18" stroke="#F7F5F1" stroke-width="6" stroke-linecap="round"/><path d="M70 65L52 47" stroke="#F7F5F1" stroke-width="6" stroke-linecap="round"/><rect x="18" y="54" width="26" height="18" rx="8" transform="rotate(-32 31 63)" fill="#66786A"/><rect x="52" y="54" width="26" height="18" rx="8" transform="rotate(32 65 63)" fill="#9B6B52"/><circle cx="48" cy="33" r="10" fill="#C8A15A"/><path d="M30 36c9-8 27-8 36 0" stroke="#C8A15A" stroke-width="4" fill="none" stroke-linecap="round"/></svg>`,
      kitchen: `<svg viewBox="0 0 96 96" aria-hidden="true"><rect x="16" y="18" width="64" height="60" rx="5" fill="#66786A"/><path d="M16 48h64M48 18v60M16 34h64" stroke="#F7F5F1" stroke-width="4"/><rect x="18" y="20" width="60" height="14" fill="#9B6B52" opacity=".82"/><path d="M30 27h36" stroke="#C8A15A" stroke-width="4" stroke-linecap="round"/><circle cx="64" cy="61" r="6" fill="#C8A15A"/></svg>`,
      middle: `<svg viewBox="0 0 96 96" aria-hidden="true"><path d="M48 18v60" stroke="#F7F5F1" stroke-width="5" stroke-dasharray="6 7" stroke-linecap="round"/><path d="M16 48h24m-8-8l8 8-8 8M80 48H56m8-8l-8 8 8 8" stroke="#66786A" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><circle cx="28" cy="26" r="10" fill="#9B6B52"/><circle cx="68" cy="70" r="10" fill="#C8A15A"/><text x="48" y="56" text-anchor="middle" font-family="Arial" font-size="30" font-weight="900" fill="#F7F5F1">?</text></svg>`,
      net: `<svg viewBox="0 0 96 96" aria-hidden="true"><path d="M14 51h68" stroke="#F7F5F1" stroke-width="5" stroke-linecap="round"/><path d="M20 34v34M32 34v34M44 34v34M56 34v34M68 34v34M80 34v34" stroke="#F7F5F1" stroke-width="2" opacity=".75"/><path d="M14 34h68v34H14z" fill="none" stroke="#F7F5F1" stroke-width="3"/><path d="M22 27c14 13 32 13 48 0" stroke="#C8A15A" stroke-width="5" fill="none" stroke-linecap="round"/><circle cx="70" cy="28" r="8" fill="#9B6B52"/></svg>`,
      miss: `<svg viewBox="0 0 96 96" aria-hidden="true"><path d="M26 70l22-22" stroke="#F7F5F1" stroke-width="7" stroke-linecap="round"/><rect x="18" y="61" width="31" height="20" rx="9" transform="rotate(-35 33.5 71)" fill="#66786A"/><circle cx="63" cy="28" r="10" fill="#C8A15A"/><path d="M56 42c12 7 19 14 22 25" stroke="#9B6B52" stroke-width="5" fill="none" stroke-linecap="round" stroke-dasharray="2 8"/><path d="M64 54l14 14m0-14L64 68" stroke="#C8A15A" stroke-width="6" stroke-linecap="round"/></svg>`
    };

    const pairs = [
      { key: "score", title: "The score", note: "7-11-2 needs a translator", art: art.score },
      { key: "dink", title: "Dinking", note: "soft forever, then chaos", art: art.dink },
      { key: "kitchen", title: "The kitchen", note: "a silly line everyone obeys", art: art.kitchen },
      { key: "middle", title: "Who's got middle?", note: "confusion becomes signal", art: art.middle },
      { key: "net", title: "Net apology", note: "sorry, but also point", art: art.net },
      { key: "miss", title: "Easy miss", note: "the sitter humbles everyone", art: art.miss }
    ];

    const board = document.querySelector("#board");
    const scoreCount = document.querySelector("#score-count");
    const fill = document.querySelector("#fill");
    const status = document.querySelector("#status");
    const reset = document.querySelector("#reset");
    const previewGraphics = new URLSearchParams(window.location.search).get("preview") === "graphics";
    let openCards = [];
    let matched = 0;
    let locked = false;

    function shuffle(items) {
      return items
        .map((item) => ({ item, sort: Math.random() }))
        .sort((a, b) => a.sort - b.sort)
        .map(({ item }) => item);
    }

    function makeDeck() {
      return shuffle(pairs.flatMap((pair) => [
        { ...pair, id: `${pair.key}-a` },
        { ...pair, id: `${pair.key}-b` }
      ]));
    }

    function renderScore(message) {
      scoreCount.textContent = `${matched} / ${pairs.length}`;
      fill.style.width = `${Math.round((matched / pairs.length) * 100)}%`;
      if (message) status.textContent = message;
    }

    function renderBoard() {
      board.innerHTML = "";
      openCards = [];
      matched = 0;
      locked = false;
      makeDeck().forEach((cardData) => {
        const card = document.createElement("button");
        card.className = "card";
        card.type = "button";
        card.dataset.key = cardData.key;
        card.setAttribute("aria-label", `Hidden card for ${cardData.title}`);
        card.innerHTML = `
          <span class="card-inner">
            <span class="face front">
              <span class="card-logo">
                <svg viewBox="0 0 120 104" aria-hidden="true">
                  <path d="M32 79l22-22" stroke="#66786A" stroke-width="8" stroke-linecap="round"/>
                  <path d="M88 79L66 57" stroke="#9B6B52" stroke-width="8" stroke-linecap="round"/>
                  <rect x="18" y="67" width="31" height="20" rx="9" transform="rotate(-34 33.5 77)" fill="#66786A"/>
                  <rect x="71" y="67" width="31" height="20" rx="9" transform="rotate(34 86.5 77)" fill="#9B6B52"/>
                  <circle cx="60" cy="39" r="28" fill="#C8A15A" stroke="#1D2433" stroke-width="3"/>
                  <circle cx="49" cy="33" r="4" fill="#F7F5F1"/>
                  <circle cx="71" cy="33" r="4" fill="#F7F5F1"/>
                  <circle cx="60" cy="48" r="4" fill="#F7F5F1"/>
                  <path d="M47 55c7 7 19 7 26 0" stroke="#1D2433" stroke-width="4" fill="none" stroke-linecap="round"/>
                  <path d="M42 22l-7-8m43 8l7-8" stroke="#9B6B52" stroke-width="5" stroke-linecap="round"/>
                </svg>
                <strong>Silly</strong>
                <span>Pickleball</span>
              </span>
            </span>
            <span class="face back">
              <span class="card-graphic">${cardData.art}</span>
              <span class="card-title">${cardData.title}</span>
              <span class="card-note">${cardData.note}</span>
            </span>
          </span>
        `;
        if (previewGraphics) {
          card.classList.add("open");
        }
        card.addEventListener("click", () => chooseCard(card, cardData));
        board.appendChild(card);
      });
      renderScore("Pick two cards. A match means the room got a little safer.");
    }

    function chooseCard(card, cardData) {
      if (locked || card.classList.contains("open") || card.classList.contains("matched")) return;
      card.classList.add("open");
      card.setAttribute("aria-label", `${cardData.title}: ${cardData.note}`);
      openCards.push(card);

      if (openCards.length === 1) {
        renderScore("Find the matching silly moment.");
        return;
      }

      locked = true;
      const [first, second] = openCards;
      if (first.dataset.key === second.dataset.key) {
        first.classList.add("matched");
        second.classList.add("matched");
        first.disabled = true;
        second.disabled = true;
        matched += 1;
        openCards = [];
        locked = false;
        renderScore(matched === pairs.length ? "Board cleared. The silliness became a connection graph." : "Match made. That joke now has signal.");
        return;
      }

      renderScore("Not the same silliness. Reset the moment and try again.");
      setTimeout(() => {
        first.classList.remove("open");
        second.classList.remove("open");
        first.setAttribute("aria-label", "Hidden card");
        second.setAttribute("aria-label", "Hidden card");
        openCards = [];
        locked = false;
        renderScore("Pick two cards. A match means the room got a little safer.");
      }, 780);
    }

    reset.addEventListener("click", renderBoard);
    renderBoard();
  </script>
</body>
</html>
